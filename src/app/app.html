<div class="layout">
  <aside class="sidebar" [class.collapsed]="collapsed()">

    <div class="logo">
      <div class="logo-brand">
        <svg width="28" height="28" viewBox="0 0 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="29" cy="29" r="26" stroke="#C8102E" stroke-width="2.2"/>
          <polyline
            points="3,29 9,29 12,24 16,29 19,32 22,8 26,48 30,29 36,20 42,29 55,29"
            stroke="#C8102E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"
          />
        </svg>
        <span class="logo-texto">VitaLink</span>
      </div>
    </div>

    <nav>
      <div class="nav-toggle-row">
        <button class="toggle-btn" (click)="toggleSidebar()" [title]="collapsed() ? 'Expandir' : 'Recolher'">
          @if (collapsed()) {
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
            </svg>
          }
        </button>
      </div>

      <!-- Nav única — ícone sempre fixo, texto some ao colapsar -->
      <div class="nav-full">
        <span class="nav-destaque nav-disabled">
          <span class="link-text">Visão Geral</span>
        </span>
        <a routerLink="/doadores" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" title="Doadores">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <span class="link-text">Doadores</span>
        </a>
        <a routerLink="/bolsas" routerLinkActive="active" title="Bolsas de Sangue">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 2C12 2 4 10 4 15a8 8 0 0016 0c0-5-8-13-8-13z"/>
          </svg>
          <span class="link-text">Bolsas de Sangue</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button class="sb-icon-btn" title="Ajuda">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="footer-label">Ajuda</span>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet />
  </main>
</div>
